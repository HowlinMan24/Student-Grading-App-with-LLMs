apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: edueval
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: howlinman/backend:latest
          ports:
            - containerPort: 8080
          env:
            # DataSource — points to the MySQL StatefulSet's headless service
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-0.mysql.edueval.svc.cluster.local:3306/student_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            # JPA
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DDL_AUTO
            # Logging
            - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: LOG_LEVEL_SPRING_SECURITY
            - name: LOGGING_LEVEL_COM_WEBAPP_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: LOG_LEVEL_APP
            # JWT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            # OpenAI
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_API_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OPENAI_URL
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
