apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: edueval
data:
  # Database
  DB_NAME: student_db
  DDL_AUTO: update

  # OpenRouter (free tier)
  OPENAI_URL: https://openrouter.ai/api/v1/chat/completions

  # Logging (INFO for production; change to DEBUG locally)
  LOG_LEVEL_SPRING_SECURITY: INFO
  LOG_LEVEL_APP: INFO
